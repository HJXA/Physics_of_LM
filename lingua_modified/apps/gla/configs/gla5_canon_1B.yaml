# Zeyuan note: run with 128 GPUs to replicate our result
eval_account: <zeyuan_placeholder>
eval_qos: <zeyuan_placeholder>
dump_dir: /zeyuan_placeholder/gdn1B
name: <zeyuan_placeholder>
probe_freq: null
seed: 777
logging:
  freq: 10
  wandb:
    entity: zeyuanallenzhu
    project: <zeyuan_placeholder>
    name: <zeyuan_placeholder>
optim:
  lr: 0.002
  weight_decay: 0.01
  warmup: 12000
  lr_min_ratio: 0.01
  epsilon: 1.0e-08
  beta1: 0.9
  beta2: 0.95
  clip: 1
  scheduler: cosine
distributed:
  fsdp_type: full_shard
  compile: true
  model_dtype: bf16
  matmul_allow_tf32: false
  selective_activation_checkpointing: false
  tp_size: 1
model:
  dim: 2048
  n_layers: 24
  n_heads: 16
  model_name: GLA5      # Zeyuan's note: GLA5 is our codename for running with a 6d^2 + 6d^2 configuration (esp. with low-rank gating matrix)
  canon_set: AbbCD      # Zeyuan's note: AbbCD is equivalent to AbCD --- I'm a Windows user so I have to use AbbCD to distinguish it from ABCD in file names
data:
  root_dir: /zeyuan_placeholder/nemotron-cc/
  sources:
    quality=high=shuffled: 1.0
  batch_size: 1
  prefetch_size: 1024
  seq_len: 16384
  n_views: 2
  load_async: true
  add_bos: true
  add_eos: true
  tokenizer:
    name: sp
    path: /zeyuan_placeholder/llama2/tokenizer.model
profiling:
  run: false
checkpoint:
  dump:
    every: 300
    keep: 3
  eval:
    every: 300
    keep: -1
async_eval_gpus: 8
eval:
  harness:
    tasks:
    - hellaswag
    - task: boolq
      dataset_kwargs:
        trust_remote_code: true
    - piqa
    - task: social_iqa
      dataset_kwargs:
        trust_remote_code: true
    - winogrande
    - openbookqa
    - arc_easy
    - arc_challenge
    - race
    - commonsense_qa
    - copa
    - task: lambada_openai
      dataset_kwargs:
        trust_remote_code: true
      metric_list:
      - metric: acc
        aggregation: mean
        higher_is_better: true
    - triviaqa
    - mmlu
    log_samples: false
  validation: null
  generator:
    max_tokens: 8192
    dtype: bf16
    show_progress: true
steps: 480000
grad_acc_steps: 1
